<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제하♥해민 데이트 지도</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
  body { margin: 0; padding: 20px; background: #EDE7D6; }
</style>
</head>
<body>
<div id="km-app" data-bg-scope style="--paper:#F6F1E4; --ink:#2B2A25; --line:#B8AE95; --muted:#8A8270; --heart:#C1436B;">
<style>
  #km-app {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    border-radius: 18px;
    padding: 26px 22px 30px;
    max-width: 960px;
    margin: 0 auto;
    box-sizing: border-box;
    position: relative;
    background-image:
      radial-gradient(circle at 8% 12%, rgba(184,134,59,0.06), transparent 40%),
      radial-gradient(circle at 92% 88%, rgba(193,67,107,0.06), transparent 45%);
  }
  #km-app * { box-sizing: border-box; }
  .km-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 14px;
    margin-bottom: 4px;
  }
  .km-title-row { display:flex; align-items:center; gap:8px; }
  .km-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 25px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .km-title .heart { color: var(--heart); }
  .km-sub-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top: 5px; }
  .km-sub { font-size: 12.5px; color: var(--muted); margin: 0; font-family: 'Noto Serif KR', serif; font-style: italic; }
  .km-dday { font-size: 11px; color: var(--heart); font-weight: 700; background: #fff; border: 1px solid var(--heart); border-radius: 999px; padding: 2px 9px; }
  .km-sido-progress { font-size: 11px; color: var(--muted); }
  .km-roulette-btn {
    display:flex; align-items:center; gap:6px;
    border: 1px solid var(--ink); background: #fff; color: var(--ink);
    font-size: 12.5px; padding: 8px 14px; border-radius: 999px; cursor: pointer;
    font-weight: 600;
  }
  .km-roulette-btn:hover { background: var(--ink); color: #fff; }
  .km-stat-bars { display:flex; flex-direction:column; gap:6px; }
  .km-stat-row { display:flex; align-items:center; gap:8px; font-size: 11.5px; }
  .km-stat-label { width: 42px; color: var(--muted); flex-shrink:0; }
  .km-stat-track { flex:1; background:#EDE6D4; border-radius: 5px; height: 10px; overflow:hidden; }
  .km-stat-fill { height:100%; border-radius: 5px; }
  .km-stat-count { width: 20px; text-align:right; color: var(--muted); flex-shrink:0; }
  .km-roulette-display {
    background: #fff; border: 2px dashed var(--line); border-radius: 12px;
    padding: 28px 16px; text-align: center; margin: 14px 0;
    font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700;
    min-height: 32px; color: var(--ink);
  }
  .km-roulette-display.spinning { color: var(--muted); font-weight: 400; }
  .km-roulette-actions { display:flex; gap:8px; }
  .km-header-right { display:flex; align-items:center; gap:10px; flex-wrap: wrap; justify-content: flex-end; }
  .km-stats { text-align: right; font-family: 'Noto Serif KR', serif; }
  .km-count { font-size: 26px; font-weight: 700; color: var(--heart); line-height: 1; }
  .km-count small { font-size: 12.5px; color: var(--muted); font-weight: 400; font-family: 'Noto Sans KR', sans-serif; }
  .km-icon-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--line); background: #fff;
    display:flex; align-items:center; justify-content:center;
    cursor: pointer; font-size: 16px; color: var(--ink);
    flex-shrink: 0;
  }
  .km-icon-btn:hover { background: var(--ink); color: #fff; }

  .km-years { display: flex; gap: 6px; flex-wrap: wrap; margin: 14px 0 4px; }
  .km-year-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px; border: 1.5px solid var(--line);
    background: #fff; font-size: 12.5px; cursor: pointer; color: var(--muted);
    transition: all 0.12s ease;
  }
  .km-year-pill .dot { width: 9px; height: 9px; border-radius: 50%; }
  .km-year-pill.active { border-color: var(--ink); color: var(--ink); font-weight: 700; box-shadow: 0 0 0 1px var(--ink) inset; }
  .km-year-hint { font-size: 11px; color: var(--muted); margin: 2px 0 12px; }

  .km-body { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
  .km-map-wrap {
    flex: 1 1 480px; min-width: 280px; position: relative;
    background: #FBF8F0; border: 1px solid var(--line); border-radius: 10px;
    overflow: hidden; aspect-ratio: 700 / 741.4; touch-action: none;
  }
  .km-zoom-layer { width: 100%; height: 100%; transform-origin: 0 0; cursor: grab; }
  .km-zoom-layer.dragging { cursor: grabbing; }
  .km-map-wrap svg { width: 100%; height: 100%; display: block; }
  .km-region { fill: #EDE6D4; stroke: #D9CDAE; stroke-width: 0.6; cursor: pointer; transition: fill 0.15s ease; }
  .km-region:hover { fill: #DED2AE; }
  .km-photo-dot { pointer-events: none; }
  .km-tooltip {
    position: absolute; pointer-events: none; background: var(--ink); color: var(--paper);
    font-size: 12px; padding: 4px 9px; border-radius: 5px; transform: translate(-50%, -130%);
    white-space: nowrap; opacity: 0; transition: opacity 0.1s ease; z-index: 5;
  }
  .km-zoom-controls { position: absolute; right: 10px; bottom: 10px; display: flex; flex-direction: column; gap: 4px; z-index: 6; }
  .km-zoom-btn { width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--line); background: #fff; font-size: 15px; cursor: pointer; color: var(--ink); line-height: 1; }
  .km-zoom-btn:hover { background: var(--ink); color: #fff; }
  .km-loading { font-size: 12px; color: var(--muted); padding: 8px; }

  .km-side { flex: 1 1 230px; min-width: 210px; display: flex; flex-direction: column; gap: 12px; }
  .km-panel { background: #FBF8F0; border: 1px solid var(--line); border-radius: 10px; padding: 13px 15px; }
  .km-panel h3 { margin: 0 0 8px; font-size: 12.5px; font-family: 'Noto Serif KR', serif; color: var(--muted); font-weight: 600; }
  .km-search { width: 100%; padding: 8px 10px; border: 1px solid var(--line); border-radius: 7px; font-size: 12.5px; background: #fff; outline: none; }
  .km-search:focus { border-color: var(--heart); }

  .km-year-group { margin-bottom: 10px; }
  .km-year-group:last-child { margin-bottom: 0; }
  .km-year-group-label { display:flex; align-items:center; gap:6px; font-size: 11.5px; color: var(--muted); margin-bottom: 5px; font-weight: 600; user-select: none; }
  .km-year-group-label:hover { color: var(--ink); }
  .km-chevron { margin-left: auto; font-size: 10px; }
  .km-year-group-label .dot { width: 8px; height: 8px; border-radius: 50%; }
  .km-visited-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .km-chip {
    display: flex; align-items: center; gap: 5px; color: #fff; font-size: 11.5px;
    padding: 3px 6px 3px 10px; border-radius: 999px; cursor: pointer;
  }
  .km-chip .cam { font-size: 10.5px; opacity: 0.9; }
  .km-chip .x {
    cursor: pointer; opacity: 0.8; font-size: 12px; width: 15px; height: 15px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; background: rgba(255,255,255,0.25);
  }
  .km-chip .x:hover { opacity: 1; background: rgba(255,255,255,0.4); }
  .km-empty { font-size: 12px; color: var(--muted); line-height: 1.6; }

  .km-actions { display: flex; gap: 8px; }
  .km-btn {
    flex: 1; border: 1px solid var(--ink); background: transparent; color: var(--ink);
    font-size: 12px; padding: 8px 8px; border-radius: 7px; cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .km-btn:hover { background: var(--ink); color: var(--paper); }
  .km-btn.danger { border-color: var(--heart); color: var(--heart); }
  .km-btn.danger:hover { background: var(--heart); color: #fff; }

  .km-modal-overlay {
    position: fixed; inset: 0; background: rgba(43,42,37,0.55);
    display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
  }
  .km-modal-overlay.open { display: flex; }
  .km-modal {
    background: var(--paper); border-radius: 14px; padding: 20px 22px 22px;
    max-width: 460px; width: 100%; max-height: 84vh; overflow-y: auto;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  .km-modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom: 14px; }
  .km-modal-title { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; margin:0; }
  .km-modal-close { cursor:pointer; font-size: 20px; color: var(--muted); border:none; background:none; line-height:1; }
  .km-modal-close:hover { color: var(--ink); }
  .km-swatches { display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 10px; }
  .km-swatch {
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; box-shadow: 0 0 0 1px var(--line);
  }
  .km-swatch.active { border-color: var(--ink); }
  .km-settings-row { margin-bottom: 16px; }
  .km-settings-row label { font-size: 12px; color: var(--muted); display:block; margin-bottom: 6px; font-weight: 600; }
  .km-file-btn {
    display:inline-block; padding: 8px 14px; border: 1px solid var(--ink); border-radius: 7px;
    font-size: 12.5px; cursor: pointer; background: transparent;
  }
  .km-file-btn:hover { background: var(--ink); color: #fff; }
  .km-photo-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 0; }
  .km-photo-thumb { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #eee; }
  .km-photo-thumb img { width:100%; height:100%; object-fit: cover; display:block; }
  .km-photo-thumb .rm {
    position:absolute; top:4px; right:4px; width:20px; height:20px; border-radius:50%;
    background: rgba(0,0,0,0.55); color:#fff; display:flex; align-items:center; justify-content:center;
    font-size: 12px; cursor:pointer;
  }
  .km-photo-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

  @media (max-width: 640px) {
    .km-title { font-size: 20px; }
    .km-stats { text-align: left; }
  }
</style>

<div class="km-header">
  <div class="km-title-row">
    <div>
      <p class="km-title">제하<span class="heart">♥</span>해민 데이트 지도</p>
      <div class="km-sub-row">
        <p class="km-sub">2025년부터, 함께 다녀온 곳들</p>
        <span class="km-dday" id="km-dday"></span>
        <span class="km-sido-progress" id="km-sido-progress"></span>
      </div>
    </div>
  </div>
  <div class="km-header-right">
    <button class="km-roulette-btn" id="km-roulette-btn">🎲 다음 여행지 뽑기</button>
    <div class="km-stats">
      <div class="km-count" id="km-count">0<small> / 229</small></div>
      <div style="font-size:11px; color:var(--muted);" id="km-pct">0% 방문</div>
    </div>
    <button class="km-icon-btn" id="km-settings-btn" title="설정">⚙</button>
  </div>
</div>

<div class="km-years" id="km-years"></div>
<div class="km-year-hint">연도를 선택하고 지도를 클릭하면 그 연도로 칠해져요. 같은 곳을 다른 연도에도 갔다면 연도만 바꿔서 또 클릭하면 두 색이 같이 표시돼요. 다녀온 곳 이름을 누르면 사진 추가 가능.</div>

<div class="km-body">
  <div class="km-map-wrap" id="km-map-wrap">
    <div class="km-loading" id="km-loading">불러오는 중…</div>
    <div class="km-zoom-layer" id="km-zoom-layer">
      <svg id="km-svg" viewBox="0 0 700 741.4" style="display:none;"></svg>
    </div>
    <div class="km-tooltip" id="km-tooltip"></div>
    <div class="km-zoom-controls">
      <button class="km-zoom-btn" id="km-zoom-in">+</button>
      <button class="km-zoom-btn" id="km-zoom-out">−</button>
      <button class="km-zoom-btn" id="km-zoom-reset" title="초기화">⤾</button>
    </div>
  </div>
  <div class="km-side">
    <div class="km-panel">
      <h3>지역 검색</h3>
      <input class="km-search" id="km-search" placeholder="예: 강남구, 부산" />
    </div>
    <div class="km-panel">
      <h3>연도별 기록</h3>
      <div class="km-stat-bars" id="km-stat-bars"></div>
    </div>
    <div class="km-panel" style="flex:1;">
      <h3>다녀온 곳</h3>
      <div id="km-visited-groups">
        <div class="km-empty">아직 색칠한 지역이 없어요.<br/>연도를 고르고 지도를 클릭해보세요.</div>
      </div>
    </div>
    <div class="km-actions">
      <button class="km-btn" id="km-export" style="flex:1;">내보내기</button>
    </div>
  </div>
</div>

<div class="km-modal-overlay" id="km-roulette-overlay">
  <div class="km-modal" id="km-roulette-modal"></div>
</div>

<div class="km-modal-overlay" id="km-modal-overlay">
  <div class="km-modal" id="km-modal"></div>
</div>
</div>

<script>
(function() {
  const AppStorage = (function() {
    let backend = 'local';
    const DEFAULT_FIREBASE_CONFIG = {
      apiKey: "AIzaSyBWEokexBP8UGef_BnvpqcammcIru9VNrQ",
      authDomain: "jehahaemin-map.firebaseapp.com",
      projectId: "jehahaemin-map",
      storageBucket: "jehahaemin-map.firebasestorage.app",
      messagingSenderId: "359584553180",
      appId: "1:359584553180:web:e3cf9d8d4b4e7ccc39bc19"
    };
    const DISABLED_KEY = 'km-firebase-disabled';
    let db = null;
    let unsubscribe = null;
    let remoteCb = null;
    const CFG_KEY = 'km-firebase-config';

    const localImpl = {
      async get(key) {
        const raw = localStorage.getItem('km-ls:' + key);
        if (raw === null) throw new Error('not found');
        return { key, value: raw };
      },
      async set(key, value) {
        localStorage.setItem('km-ls:' + key, value);
        return { key, value };
      },
      async delete(key) {
        localStorage.removeItem('km-ls:' + key);
        return { key, deleted: true };
      },
      async list(prefix) {
        const keys = [];
        const p = 'km-ls:' + (prefix || '');
        for (let i = 0; i < localStorage.length; i++) {
          const lk = localStorage.key(i);
          if (lk && lk.indexOf(p) === 0) keys.push(lk.slice('km-ls:'.length));
        }
        return { keys, prefix };
      }
    };

    const firestoreImpl = {
      async get(key) {
        const snap = await db.collection('kmStorage').doc(key).get();
        if (!snap.exists) throw new Error('not found');
        return { key, value: snap.data().value };
      },
      async set(key, value) {
        await db.collection('kmStorage').doc(key).set({ value: value, updatedAt: Date.now() });
        return { key, value };
      },
      async delete(key) {
        await db.collection('kmStorage').doc(key).delete();
        return { key, deleted: true };
      },
      async list(prefix) {
        const p = prefix || '';
        const snap = await db.collection('kmStorage')
          .orderBy(firebase.firestore.FieldPath.documentId())
          .startAt(p).endAt(p + '\uf8ff').get();
        const keys = [];
        snap.forEach(doc => keys.push(doc.id));
        return { keys, prefix };
      }
    };

    function current() { return backend === 'firestore' ? firestoreImpl : localImpl; }

    return {
      async get(key) { return current().get(key); },
      async set(key, value) { return current().set(key, value); },
      async delete(key) { return current().delete(key); },
      async list(prefix) { return current().list(prefix); },
      isFirestore() { return backend === 'firestore'; },
      onRemoteChange(cb) { remoteCb = cb; },
      connect(cfg) {
        try {
          if (typeof firebase === 'undefined') throw new Error('Firebase SDK 로드 실패');
          if (firebase.apps && firebase.apps.length) {
            firebase.apps.slice().forEach(a => a.delete());
          }
          firebase.initializeApp(cfg);
          db = firebase.firestore();
          backend = 'firestore';
          localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
          localStorage.removeItem(DISABLED_KEY);
          if (unsubscribe) { unsubscribe(); unsubscribe = null; }
          unsubscribe = db.collection('kmStorage').onSnapshot((snap) => {
            snap.docChanges().forEach((change) => {
              if (!remoteCb) return;
              if (change.type === 'removed') remoteCb(change.doc.id, null);
              else remoteCb(change.doc.id, change.doc.data().value);
            });
          }, (err) => console.error('실시간 동기화 오류', err));
          return true;
        } catch (e) {
          console.error('Firebase 연결 실패', e);
          backend = 'local';
          db = null;
          return false;
        }
      },
      disconnect() {
        backend = 'local';
        db = null;
        localStorage.removeItem(CFG_KEY);
        localStorage.setItem(DISABLED_KEY, '1');
        if (unsubscribe) { unsubscribe(); unsubscribe = null; }
      },
      tryAutoConnect() {
        try {
          if (localStorage.getItem(DISABLED_KEY) === '1') return false;
          const raw = localStorage.getItem(CFG_KEY);
          const cfg = raw ? JSON.parse(raw) : DEFAULT_FIREBASE_CONFIG;
          return this.connect(cfg);
        } catch (e) {}
        return false;
      },
      savedConfig() {
        try {
          const raw = localStorage.getItem(CFG_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch (e) { return null; }
      }

  function updateDday() {
    const now = new Date();
    const diffDays = Math.floor((now - START_DATE) / 86400000) + 1;
    ddayEl.textContent = '함께한 지 D+' + diffDays + '일';
  }

  function updateStats() {
    const visitedIds = Object.keys(visited);
    const visitedSido = new Set(visitedIds.map(id => sidoOf(id)));
    sidoProgressEl.textContent = visitedSido.size + ' / ' + allSidoCodes.size + '개 시·도';

    const yearCounts = {};
    visitedIds.forEach(id => {
      (visited[id] || []).forEach(y => { yearCounts[y] = (yearCounts[y] || 0) + 1; });
    });
    const years = Object.keys(yearCounts).sort((a, b) => b - a);
    if (years.length === 0) {
      statBarsEl.innerHTML = '<div class="km-empty">아직 기록이 없어요.</div>';
      return;
    }
    const max = Math.max(...years.map(y => yearCounts[y]));
    statBarsEl.innerHTML = '';
    years.forEach(y => {
      const row = document.createElement('div');
      row.className = 'km-stat-row';
      const label = document.createElement('span');
      label.className = 'km-stat-label';
      label.textContent = y + '년';
      const track = document.createElement('div');
      track.className = 'km-stat-track';
      const fill = document.createElement('div');
      fill.className = 'km-stat-fill';
      fill.style.width = Math.max(6, (yearCounts[y] / max * 100)) + '%';
      fill.style.background = colorForYear(y);
      track.appendChild(fill);
      const count = document.createElement('span');
      count.className = 'km-stat-count';
      count.textContent = yearCounts[y];
      row.appendChild(label);
      row.appendChild(track);
      row.appendChild(count);
      statBarsEl.appendChild(row);
    });
  }

  const thisYear = new Date().getFullYear();
  const maxYear = Math.max(thisYear + 1, START_YEAR + 3);
  const YEARS = [];
  for (let y = START_YEAR; y <= maxYear; y++) YEARS.push(y);

  function colorForYear(y) {
    const idx = ((y - START_YEAR) % PALETTE.length + PALETTE.length) % PALETTE.length;
    return PALETTE[idx];
  }

  let visited = {};
  let collapsedYears = new Set();

  function normalizeVisited() {
    Object.keys(visited).forEach(id => {
      const v = visited[id];
      if (!Array.isArray(v)) visited[id] = [v];
      visited[id] = [...new Set(visited[id])].sort((a, b) => a - b);
      if (visited[id].length === 0) delete visited[id];
    });
  }
  let activeYear = Math.min(Math.max(thisYear, START_YEAR), maxYear);
  let photoIds = new Set();

  // ---------- Year pills ----------
  function buildYearPills() {
    yearsEl.innerHTML = '';
    YEARS.forEach(y => {
      const pill = document.createElement('div');
      pill.className = 'km-year-pill' + (y === activeYear ? ' active' : '');
      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = colorForYear(y);
      pill.appendChild(dot);
      pill.appendChild(document.createTextNode(y + '년'));
      pill.addEventListener('click', () => { activeYear = y; buildYearPills(); });
      yearsEl.appendChild(pill);
    });
  }

  // ---------- Map ----------
  function buildSvg() {
    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    defs.setAttribute('id', 'km-gradients');
    svg.appendChild(defs);
    const frag = document.createDocumentFragment();
    REGIONS.forEach(r => {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', r.path);
      path.setAttribute('class', 'km-region');
      path.setAttribute('data-id', r.id);
      path.setAttribute('data-name', r.name);
      path.addEventListener('click', () => onRegionClick(r.id));
      path.addEventListener('mousemove', (e) => showTip(e, r.name));
      path.addEventListener('mouseleave', hideTip);
      frag.appendChild(path);
    });
    svg.appendChild(frag);
    svg.style.display = 'block';
    loading.style.display = 'none';
  }

  function showTip(e, name) {
    const wrapRect = mapWrap.getBoundingClientRect();
    tooltip.textContent = name;
    tooltip.style.left = (e.clientX - wrapRect.left) + 'px';
    tooltip.style.top = (e.clientY - wrapRect.top) + 'px';
    tooltip.style.opacity = '1';
  }
  function hideTip() { tooltip.style.opacity = '0'; }

  async function mergeLatestVisited() {
    try {
      const res = await AppStorage.get(STORAGE_KEY);
      if (res && res.value) visited = JSON.parse(res.value);
    } catch (e) { /* nothing saved remotely yet, keep local */ }
    normalizeVisited();
  }

  async function onRegionClick(id) {
    await mergeLatestVisited();
    const years = visited[id] || [];
    const idx = years.indexOf(activeYear);
    if (idx >= 0) years.splice(idx, 1);
    else years.push(activeYear);
    if (years.length === 0) delete visited[id];
    else visited[id] = years.sort((a, b) => a - b);
    render();
    save();
  }

  async function removeRegionYear(id, year) {
    await mergeLatestVisited();
    if (visited[id]) {
      visited[id] = visited[id].filter(y => y !== year);
      if (visited[id].length === 0) delete visited[id];
    }
    render();
    save();
  }

  function fillForYears(years) {
    if (years.length === 1) return colorForYear(years[0]);
    const gradId = 'grad-' + years.join('-');
    const defs = svg.querySelector('#km-gradients');
    if (!defs.querySelector('#' + gradId)) {
      const grad = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
      grad.setAttribute('id', gradId);
      grad.setAttribute('x1', '0'); grad.setAttribute('y1', '0');
      grad.setAttribute('x2', '1'); grad.setAttribute('y2', '0');
      const n = years.length;
      years.forEach((y, i) => {
        const color = colorForYear(y);
        const start = (i / n * 100).toFixed(2) + '%';
        const end = ((i + 1) / n * 100).toFixed(2) + '%';
        const s1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
        s1.setAttribute('offset', start); s1.setAttribute('stop-color', color);
        const s2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
        s2.setAttribute('offset', end); s2.setAttribute('stop-color', color);
        grad.appendChild(s1); grad.appendChild(s2);
      });
      defs.appendChild(grad);
    }
    return 'url(#' + gradId + ')';
  }

  function render() {
    svg.querySelectorAll('.km-photo-dot').forEach(el => el.remove());
    REGIONS.forEach(r => {
      const el = svg.querySelector('path[data-id="' + r.id + '"]');
      if (!el) return;
      const years = visited[r.id];
      if (years && years.length) {
        el.style.fill = fillForYears(years);
        el.style.stroke = 'rgba(0,0,0,0.35)';
      } else {
        el.style.fill = '';
        el.style.stroke = '';
      }
      if (photoIds.has(r.id)) {
        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', r.cx);
        c.setAttribute('cy', r.cy);
        c.setAttribute('r', 2.6);
        c.setAttribute('fill', '#fff');
        c.setAttribute('stroke', '#2B2A25');
        c.setAttribute('stroke-width', '0.6');
        c.setAttribute('class', 'km-photo-dot');
        svg.appendChild(c);
      }
    });
    const count = Object.keys(visited).length;
    countEl.innerHTML = count + '<small> / ' + total + '</small>';
    pctEl.textContent = Math.round((count / total) * 100) + '% 방문';
    updateStats();
    renderGroups();
  }

  function renderGroups() {
    const ids = Object.keys(visited);
    if (ids.length === 0) {
      groupsEl.innerHTML = '<div class="km-empty">아직 색칠한 지역이 없어요.<br/>연도를 고르고 지도를 클릭해보세요.</div>';
      return;
    }
    const byYear = {};
    ids.forEach(id => {
      (visited[id] || []).forEach(y => {
        (byYear[y] = byYear[y] || []).push(id);
      });
    });

    groupsEl.innerHTML = '';
    Object.keys(byYear).sort((a, b) => b - a).forEach(y => {
      const isCollapsed = collapsedYears.has(y);
      const group = document.createElement('div');
      group.className = 'km-year-group';

      const label = document.createElement('div');
      label.className = 'km-year-group-label';
      label.style.cursor = 'pointer';
      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = colorForYear(y);
      label.appendChild(dot);
      label.appendChild(document.createTextNode(y + '년 (' + byYear[y].length + ')'));

      chevron.textContent = isCollapsed ? '▸' : '▾';
      label.appendChild(chevron);
      label.addEventListener('click', () => {
        if (collapsedYears.has(y)) collapsedYears.delete(y);
        else collapsedYears.add(y);
        renderGroups();
      });
      group.appendChild(label);

      if (!isCollapsed) {
        const list = document.createElement('div');
        list.className = 'km-visited-list';
        byYear[y].sort((a, b) => nameOf[a].localeCompare(nameOf[b], 'ko')).forEach(id => {
          const chip = document.createElement('span');
          chip.className = 'km-chip';
          chip.style.background = colorForYear(y);
          chip.title = '눌러서 사진 추가/보기';
          const label2 = document.createElement('span');
          label2.textContent = nameOf[id];
          chip.appendChild(label2);
          if (photoIds.has(id)) {
            const cam = document.createElement('span');
            cam.className = 'cam';
            cam.textContent = '📷';
            chip.appendChild(cam);
          }
          const x = document.createElement('span');
          x.className = 'x';
          x.textContent = '×';
          x.title = '이 연도에서 삭제';
          x.addEventListener('click', (e) => { e.stopPropagation(); removeRegionYear(id, Number(y)); });
          chip.appendChild(x);
          chip.addEventListener('click', () => openPhotoModal(id));
          list.appendChild(chip);
        });
        group.appendChild(list);
      }
      groupsEl.appendChild(group);
    });
  }

    try { await AppStorage.set(STORAGE_KEY, JSON.stringify(visited), false); }
    catch (e) { console.error('저장 실패', e); }
  }

  async function load() {
    try {
      const res = await AppStorage.get(STORAGE_KEY, false);
      if (res && res.value) visited = JSON.parse(res.value);
    } catch (e) {
      try {
        const legacy = await AppStorage.get(STORAGE_KEY_LEGACY, false);

          JSON.parse(legacy.value).forEach(id => visited[id] = [START_YEAR]);

    }
    normalizeVisited();
    try {
      const list = await AppStorage.list(PHOTO_PREFIX, false);
      if (list && list.keys) {

  // ---------- Photo modal (per region) ----------
  function resizeImageFile(file, maxDim, quality) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const reader = new FileReader();
      reader.onload = (e) => { img.src = e.target.result; };
      reader.onerror = reject;
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
        else if (h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function loadPhotosFor(id) {
    try {
      const res = await AppStorage.get(PHOTO_PREFIX + id, false);
      if (res && res.value) return JSON.parse(res.value);

    return [];

  async function savePhotosFor(id, arr) {
    if (arr.length === 0) {
      try { await AppStorage.delete(PHOTO_PREFIX + id, false); } catch (e) {}
      photoIds.delete(id);
    } else {
      await AppStorage.set(PHOTO_PREFIX + id, JSON.stringify(arr), false);
      photoIds.add(id);
    }
  }

  function renderPhotoModal(id, photos) {
    modal.innerHTML = '';
    const head = document.createElement('div');
    head.className = 'km-modal-head';
    const yr = (visited[id] && visited[id].length) ? visited[id].join('·') + '년 · ' : '';

    const closeBtn = document.createElement('button');

    closeBtn.textContent = '✕';
    closeBtn.addEventListener('click', closeModal);
    head.appendChild(closeBtn);
    modal.appendChild(head);

    const grid = document.createElement('div');
    grid.className = 'km-photo-grid';
    photos.forEach((src, i) => {
      const thumb = document.createElement('div');
      thumb.className = 'km-photo-thumb';
      const img = document.createElement('img');
      img.src = src;
      thumb.appendChild(img);
      const rm = document.createElement('div');
      rm.className = 'rm';
      rm.textContent = '×';
      rm.addEventListener('click', async () => {
        photos = photos.filter((_, idx) => idx !== i);
        await savePhotosFor(id, photos);
        render();
        renderPhotoModal(id, photos);
      });
      thumb.appendChild(rm);
      grid.appendChild(thumb);
    });

    if (photos.length < MAX_PHOTOS) {
      const fileLabel = document.createElement('label');
      fileLabel.className = 'km-file-btn';
      fileLabel.textContent = '+ 사진 추가';
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.multiple = true;
      fileInput.style.display = 'none';
      fileInput.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files).slice(0, MAX_PHOTOS - photos.length);
        for (const file of files) {
          try {
            const dataUrl = await resizeImageFile(file, MAX_DIM, JPEG_QUALITY);
            photos.push(dataUrl);
          } catch (err) {}
        }
        try {
          await savePhotosFor(id, photos);
          render();
          renderPhotoModal(id, photos);
        } catch (err) { alert('사진 저장에 실패했어요. 용량이 너무 클 수 있어요.'); }
      });
      fileLabel.appendChild(fileInput);
      modal.appendChild(fileLabel);
      const hint = document.createElement('div');
      hint.className = 'km-photo-hint';
      hint.textContent = '지역당 최대 ' + MAX_PHOTOS + '장 · 자동 압축 저장돼요.';
      modal.appendChild(hint);
    }
  }

  // ---------- Roulette (random unvisited pick) ----------
  function closeRoulette() { rouletteOverlay.classList.remove('open'); rouletteModal.innerHTML = ''; }
  rouletteOverlay.addEventListener('click', (e) => { if (e.target === rouletteOverlay) closeRoulette(); });

  function getUnvisited() {
    return REGIONS.filter(r => !(visited[r.id] && visited[r.id].length));
  }

  function renderRouletteContent() {
    rouletteModal.innerHTML = '';
    const head = document.createElement('div');
    head.className = 'km-modal-head';
    head.innerHTML = '<p class="km-modal-title">🎲 다음 여행지 뽑기</p>';
    const closeBtn = document.createElement('button');
    closeBtn.className = 'km-modal-close';
    closeBtn.textContent = '✕';
    closeBtn.addEventListener('click', closeRoulette);
    head.appendChild(closeBtn);
    rouletteModal.appendChild(head);

    const pool = getUnvisited();
    const display = document.createElement('div');
    display.className = 'km-roulette-display';
    rouletteModal.appendChild(display);

    if (pool.length === 0) {
      display.textContent = '이미 다 다녀오셨어요! 🎉';
      const hint = document.createElement('div');
      hint.className = 'km-photo-hint';
      hint.style.textAlign = 'center';
      hint.textContent = '229곳을 전부 색칠하셨네요.';
      rouletteModal.appendChild(hint);
      return;
    }

    const actions = document.createElement('div');
    actions.className = 'km-roulette-actions';
    const spinBtn = document.createElement('button');
    spinBtn.className = 'km-btn';
    spinBtn.textContent = '뽑기 시작';
    const closeBtn2 = document.createElement('button');
    closeBtn2.className = 'km-btn danger';
    closeBtn2.textContent = '닫기';
    closeBtn2.addEventListener('click', closeRoulette);
    actions.appendChild(spinBtn);
    actions.appendChild(closeBtn2);
    rouletteModal.appendChild(actions);

    const hint = document.createElement('div');
    hint.className = 'km-photo-hint';
    hint.style.textAlign = 'center';
    hint.style.marginTop = '8px';
    hint.textContent = '아직 안 가본 ' + pool.length + '곳 중에서 뽑아요.';
    rouletteModal.appendChild(hint);

    spinBtn.addEventListener('click', () => {
      spinBtn.disabled = true;
      display.classList.add('spinning');
      const finalPick = pool[Math.floor(Math.random() * pool.length)];
      let step = 0;
      const totalSteps = 18;
      function tick() {
        const r = pool[Math.floor(Math.random() * pool.length)];
        display.textContent = r.name;
        step++;
        if (step < totalSteps) {
          const delay = 45 + step * step * 1.6;
          setTimeout(tick, delay);
        } else {
          display.textContent = finalPick.name;
          display.classList.remove('spinning');
          spinBtn.disabled = false;
          spinBtn.textContent = '다시 뽑기';
          hint.textContent = '여기 어때요? 다음 데이트 후보!';
        }
      }
      tick();
    });
  }

  function openRouletteModal() {
    renderRouletteContent();
    rouletteOverlay.classList.add('open');
  }

  rouletteBtn.addEventListener('click', openRouletteModal);


  let scale = 1, tx = 0, ty = 0;
  const MIN_SCALE = 1, MAX_SCALE = 6;

  function applyTransform() {
    zoomLayer.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
  }
  function clampPan() {
    const rect = mapWrap.getBoundingClientRect();
    tx = Math.min(0, Math.max(-(rect.width * (scale - 1)), tx));
    ty = Math.min(0, Math.max(-(rect.height * (scale - 1)), ty));
  }
  function zoomAt(clientX, clientY, factor) {
    const rect = mapWrap.getBoundingClientRect();
    const mx = clientX - rect.left, my = clientY - rect.top;
    const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * factor));
    tx = mx - (mx - tx) * (newScale / scale);
    ty = my - (my - ty) * (newScale / scale);
    scale = newScale;
    if (scale === MIN_SCALE) { tx = 0; ty = 0; }
    clampPan();
    applyTransform();
  }
  mapWrap.addEventListener('wheel', (e) => {
    e.preventDefault();
    zoomAt(e.clientX, e.clientY, e.deltaY < 0 ? 1.15 : 0.87);
  }, { passive: false });
  root.querySelector('#km-zoom-in').addEventListener('click', () => {
    const rect = mapWrap.getBoundingClientRect();
    zoomAt(rect.left + rect.width/2, rect.top + rect.height/2, 1.3);
  });
  root.querySelector('#km-zoom-out').addEventListener('click', () => {
    const rect = mapWrap.getBoundingClientRect();
    zoomAt(rect.left + rect.width/2, rect.top + rect.height/2, 1/1.3);
  });
  root.querySelector('#km-zoom-reset').addEventListener('click', () => { scale=1; tx=0; ty=0; applyTransform(); });

  let isDragging = false, dragStart = {x:0,y:0}, panStart = {x:0,y:0};
  mapWrap.addEventListener('mousedown', (e) => {
    if (scale <= 1) return;
    isDragging = true;
    zoomLayer.classList.add('dragging');
    dragStart = { x: e.clientX, y: e.clientY };
    panStart = { x: tx, y: ty };
  });
  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    tx = panStart.x + (e.clientX - dragStart.x);
    ty = panStart.y + (e.clientY - dragStart.y);
    clampPan(); applyTransform();
  });
  window.addEventListener('mouseup', () => { isDragging = false; zoomLayer.classList.remove('dragging'); });

  let touchState = null;
  mapWrap.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      const [a,b] = e.touches;
      touchState = { mode:'pinch', dist: Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY), scale };
    } else if (e.touches.length === 1 && scale > 1) {
      const t = e.touches[0];
      touchState = { mode:'pan', x: t.clientX, y: t.clientY, tx, ty };
    }
  }, { passive: true });
  mapWrap.addEventListener('touchmove', (e) => {
    if (!touchState) return;
    if (touchState.mode === 'pinch' && e.touches.length === 2) {
      e.preventDefault();
      const [a,b] = e.touches;
      const dist = Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
      const factor = dist / touchState.dist;
      const cx = (a.clientX+b.clientX)/2, cy = (a.clientY+b.clientY)/2;
      scale = touchState.scale;
      zoomAt(cx, cy, factor);
      touchState.dist = dist; touchState.scale = scale;
    } else if (touchState.mode === 'pan' && e.touches.length === 1) {
      e.preventDefault();
      const t = e.touches[0];
      tx = touchState.tx + (t.clientX - touchState.x);
      ty = touchState.ty + (t.clientY - touchState.y);
      clampPan(); applyTransform();
    }
  }, { passive: false });
  mapWrap.addEventListener('touchend', () => { touchState = null; });

  let currentOpenPhotoId = null;
  let syncStatusEl = null;

  function setSyncStatus(text, live) {
    if (!syncStatusEl) return;
    syncStatusEl.textContent = text;
    syncStatusEl.style.color = live ? '#2E6F6E' : 'var(--muted)';
  }

  AppStorage.onRemoteChange((key, value) => {
    if (key === STORAGE_KEY) {
      visited = value ? JSON.parse(value) : {};
      normalizeVisited();
      render();
    } else if (key === SETTINGS_KEY) {
      settings = value ? JSON.parse(value) : { bgType: 'color', bgValue: '#EDE7D6' };
      applyBackground();
    } else if (key.indexOf(PHOTO_PREFIX) === 0) {
      const id = key.slice(PHOTO_PREFIX.length);
      if (value) photoIds.add(id); else photoIds.delete(id);
      render();
      if (currentOpenPhotoId === id) {
        loadPhotosFor(id).then(p => renderPhotoModal(id, p));
      }
    }
  });

  buildYearPills();
  buildSvg();
  updateDday();
  AppStorage.tryAutoConnect();
  loadSettings();
  load();
})();
</script>
